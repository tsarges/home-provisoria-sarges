<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f2044">
    <meta name="description" content="Portal pessoal de links para uso diário - Sarges">
    <meta name="color-scheme" content="light dark">
    <title>Sarges — Portal de Links</title>
    <script>
        /* Anti-FOUC: aplica o tema antes da página renderizar */
        (function () {
            try {
                var stored = localStorage.getItem('sarges:theme');
                var theme = (stored === 'light' || stored === 'dark')
                    ? stored
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (_) {}
        })();
    </script>
    <link rel="manifest" href="manifest.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --navy: #0f2044;
            --blue: #1e3c72;
            --blue-mid: #2a5298;
            --accent: #c8a96e;
            --white: #ffffff;
            --off-white: #f2f5fb;
            --text-light: #6b7a99;
            --text-dark: #1a2640;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ── FOCUS ── */
        :focus-visible {
            outline: 3px solid var(--blue-mid);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ── SKIP LINK ── */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 16px;
            background: var(--navy);
            color: #fff;
            padding: 12px 18px;
            border-radius: 0 0 8px 8px;
            z-index: 1000;
            text-decoration: none;
            font-weight: 600;
            transition: top 0.2s ease;
        }
        .skip-link:focus { top: 0; }

        /* ── THEME TOGGLE BUTTON ── */
        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: 1px solid #e4e9f4;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            z-index: 2;
            font-size: 0.95em;
            padding: 0;
        }
        .theme-toggle:hover {
            background: var(--off-white);
            transform: rotate(20deg);
        }
        [data-theme="dark"] .theme-toggle {
            border-color: #2a3760;
            color: var(--text-dark);
        }
        [data-theme="dark"] .theme-toggle:hover {
            background: #1a2342;
        }

        /* Logo swap via theme (specificidade alta pra vencer .logo { display:block }) */
        .logo.logo-dark { display: none; }
        [data-theme="dark"] .logo.logo-light { display: none; }
        [data-theme="dark"] .logo.logo-dark  { display: block; }

        /* ── HEADER ── */
        header {
            background: #fff;
            padding: 40px 32px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #e4e9f4;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .logo {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 16px;
            transition: transform 0.4s ease;
            position: relative; z-index: 1;
        }
        .logo:hover { transform: scale(1.04); }
        .header-fallback {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4em;
            color: var(--navy);
            font-weight: 600;
            letter-spacing: 0.06em;
            position: relative; z-index: 1;
            display: none;
        }
        .header-fallback.is-shown { display: block; }
        .header-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1em;
            color: var(--text-light);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 4px;
            position: relative; z-index: 1;
        }
        .header-clock {
            font-size: 0.82em;
            color: var(--text-light);
            margin-top: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            position: relative; z-index: 1;
        }
        .header-weather {
            font-size: 0.82em;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.04em;
            position: relative; z-index: 1;
            min-height: 1.2em;
        }
        .header-weather i { margin-right: 4px; }

        /* ── SEARCH ── */
        .search-wrapper {
            background: #fff;
            border-bottom: 1px solid #e4e9f4;
            padding: 14px 24px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .search-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            color: var(--text-light);
            font-size: 0.88em;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 88px 10px 38px;
            border: 1.5px solid #d0d8ef;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.88em;
            color: var(--text-dark);
            background: var(--off-white);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .search-input:focus {
            border-color: var(--blue-mid);
            box-shadow: 0 0 0 3px rgba(42,82,152,0.12);
            background: #fff;
        }
        .search-input::placeholder { color: var(--text-light); }
        .search-kbd {
            position: absolute;
            right: 44px;
            font-size: 0.7em;
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            background: #fff;
            border: 1px solid #d0d8ef;
            border-radius: 4px;
            padding: 1px 6px;
            pointer-events: none;
            line-height: 1.4;
        }
        .search-clear {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            display: none;
            align-items: center;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.15s ease, background 0.15s ease;
            font-size: 0.9em;
        }
        .search-clear:hover { color: var(--text-dark); background: #eef0f6; }
        .search-clear.visible { display: flex; }

        /* ── MAIN ── */
        main {
            max-width: 1040px;
            margin: 0 auto;
            padding: 48px 24px 64px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* ── SECTION ── */
        .section {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .section.in-view {
            animation: fadeUp 0.6s ease both;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid #eef0f6;
        }
        .section-emoji { font-size: 1.05em; line-height: 1; width: 1.2em; text-align: center; }
        .section-title {
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-light);
        }

        /* ── SECTION THEMES ── */
        .section.tjsp    { border-left: 4px solid #1e3c72; }
        .section.tjsp    .section-header { background: #eef2ff; }
        .section.tjsp    .section-emoji  { color: #1e3c72; }

        .section.outros  { border-left: 4px solid #3a6bc4; }
        .section.outros  .section-header { background: #e8efff; }
        .section.outros  .section-emoji  { color: #3a6bc4; }

        .section.sistemas{ border-left: 4px solid #0d7060; }
        .section.sistemas.section-header,
        .section.sistemas .section-header { background: #e6f5f2; }
        .section.sistemas .section-emoji  { color: #0d7060; }

        .section.juridico{ border-left: 4px solid #5c35a0; }
        .section.juridico .section-header { background: #f5f0ff; }
        .section.juridico .section-emoji  { color: #5c35a0; }

        .section.cartorios{border-left: 4px solid #b8860b; }
        .section.cartorios .section-header{ background: #fdf9ee; }
        .section.cartorios .section-emoji { color: #b8860b; }

        .section.email   { border-left: 4px solid #d44638; }
        .section.email   .section-header { background: #fff5f5; }
        .section.email   .section-emoji  { color: #d44638; }

        .section.produtiv{border-left: 4px solid #0f9d58; }
        .section.produtiv .section-header{ background: #f0fff6; }
        .section.produtiv .section-emoji { color: #0f9d58; }

        .section.ferrament{border-left: 4px solid #00838f; }
        .section.ferrament .section-header{ background: #f0fbfc; }
        .section.ferrament .section-emoji { color: #00838f; }

        .section.ias     { border-left: 4px solid #9c27b0; }
        .section.ias     .section-header { background: #fdf0ff; }
        .section.ias     .section-emoji  { color: #9c27b0; }

        .section.noticias{ border-left: 4px solid #f4a100; }
        .section.noticias .section-header{ background: #fffbef; }
        .section.noticias .section-emoji { color: #f4a100; }

        .section.pinned  { border-left: 4px solid var(--accent); }
        .section.pinned  .section-header { background: #fdf9f0; }
        .section.pinned  .section-emoji  { color: var(--accent); }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1px;
            background: #eef0f6;
        }

        /* ── BUTTON (CARD) ── */
        .btn-wrap {
            position: relative;
            background: var(--card-bg);
        }
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 20px 12px 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.78em;
            letter-spacing: 0.03em;
            transition: background 0.18s ease, transform 0.18s ease;
            text-align: center;
            line-height: 1.3;
            color: var(--text-dark);
            width: 100%;
            height: 100%;
            position: relative;
        }
        .btn:hover { transform: scale(1.03); z-index: 1; }
        .btn-icon     { font-size: 1.55em; line-height: 1; }
        .btn-label    { font-size: 1em; color: var(--text-dark); }
        .btn-sublabel { font-size: 0.82em; font-weight: 400; color: var(--text-light); }

        /* "Open in new tab" hint */
        .btn::after {
            content: '\2197';
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 0.75em;
            color: var(--text-light);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .btn:hover::after, .btn:focus-visible::after { opacity: 0.6; }

        /* Pin button */
        .btn-pin {
            position: absolute;
            top: 4px;
            left: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.78em;
            opacity: 0;
            transition: opacity 0.18s ease, color 0.18s ease, background 0.18s ease, transform 0.18s ease;
            z-index: 2;
            line-height: 1;
        }
        .btn-wrap:hover .btn-pin,
        .btn-pin:focus-visible,
        .btn-pin.is-pinned { opacity: 1; }
        .btn-pin:hover { color: var(--accent); background: rgba(200, 169, 110, 0.15); }
        .btn-pin.is-pinned { color: var(--accent); }
        .btn-pin.is-pinned:hover { transform: rotate(-20deg); }

        /* Touch devices: pin always visible */
        @media (hover: none) {
            .btn-pin { opacity: 0.55; }
        }

        /* Hover backgrounds per section */
        .tjsp     .btn:hover { background: #eef2ff; }
        .outros   .btn:hover { background: #e8efff; }
        .sistemas .btn:hover { background: #e6f5f2; }
        .juridico .btn:hover { background: #f5f0ff; }
        .cartorios .btn:hover{ background: #fdf9ee; }
        .email    .btn:hover { background: #fff8f8; }
        .produtiv .btn:hover { background: #f2fff7; }
        .ferrament .btn:hover{ background: #f0fbfc; }
        .ias      .btn:hover { background: #fef5ff; }
        .noticias .btn:hover { background: #fffdf0; }
        .pinned   .btn:hover { background: #fefaf0; }

        /* ── BRAND ICON COLORS ── */
        .icon-youtube   { color: #FF0000; }
        .icon-whatsapp  { color: #25D366; }
        .icon-facebook  { color: #1877F2; }
        .icon-telegram  { color: #26A5E4; }
        .icon-gmail     { color: #EA4335; }
        .icon-outlook   { color: #0078D4; }
        .icon-teams     { color: #6264A7; }
        .icon-yahoo     { color: #720E9E; }
        .icon-oabsp     { color: #003087; }
        .icon-cloudconv { color: #FF6E3C; }

        /* AI brand colors */
        .ia-claude     .btn-icon { color: #cc785c; }
        .ia-gemini     .btn-icon { background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .ia-chatgpt    .btn-icon { color: #10a37f; }
        .ia-grok       .btn-icon { color: #1d9bf0; }
        .ia-copilot    .btn-icon { color: #0078D4; }
        .ia-perplexity .btn-icon { color: #1FB8CD; }
        .ia-deepseek   .btn-icon { color: #4D6BFE; }
        .ia-jusia      .btn-icon { color: #e8531a; }
        .ia-mavis      .btn-icon { color: #a855f7; }

        /* Tribunal / system icon colors */
        .icon-tribunal { color: #0f2044; }
        .icon-trabalho { color: #991b1b; }
        .icon-esaj     { color: #d97706; }
        .icon-eproc    { color: #0284c7; }
        .icon-pje      { color: #0d9488; }
        .icon-ri       { color: #b8860b; }
        .icon-signo    { color: #b8860b; }

        /* Generic icon colors by type */
        .icon-doc       { color: #5c35a0; }
        .icon-briefcase { color: #c8762a; }
        .icon-search    { color: #2a5298; }
        .icon-lock      { color: #d44638; }
        .icon-money     { color: #0f9d58; }
        .icon-build     { color: #c8762a; }
        .icon-bank      { color: #0d7060; }
        .icon-gov       { color: #1e3c72; }

        /* ── UTILITIES ── */
        .hidden { display: none !important; }

        .no-results {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-light);
            font-size: 0.92em;
            display: none;
        }
        .no-results.visible { display: block; }
        .no-results-icon { font-size: 2em; margin-bottom: 12px; display: block; color: var(--text-light); }

        /* ── FOOTER ── */
        footer {
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: rgba(255,255,255,0.55);
            text-align: center;
            padding: 24px;
            font-size: 0.85em;
            letter-spacing: 0.03em;
            position: relative;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* ── ANIMATION ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            header { padding: 32px 16px 24px; }
            main { padding: 24px 12px 48px; gap: 24px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .btn { padding: 16px 8px 12px; }
            .header-fallback { font-size: 2em; }
        }

        /* ════════════════════════════════════════════════════
           DARK MODE — AMOLED BLACK
           ════════════════════════════════════════════════════ */
        [data-theme="dark"] {
            --navy: #e6ecf6;
            --blue: #2a5298;
            --blue-mid: #4a7bd4;
            --accent: #d4b67d;
            --white: #050505;
            --off-white: #000000;
            --text-light: #8d9bb8;
            --text-dark: #d8e0f0;
            --card-bg: #0d0d0d;
        }

        [data-theme="dark"] body { background: var(--off-white); color: var(--text-dark); }

        [data-theme="dark"] header { background: var(--white); border-bottom-color: #1a1a1a; }
        [data-theme="dark"] .header-fallback { color: var(--text-dark); }
        [data-theme="dark"] .header-subtitle { color: var(--text-light); }
        [data-theme="dark"] .header-clock { color: var(--text-light); }

        [data-theme="dark"] .theme-toggle { border-color: #222; color: var(--text-dark); }
        [data-theme="dark"] .theme-toggle:hover { background: #111; }

        [data-theme="dark"] .search-wrapper { background: var(--white); border-bottom-color: #1a1a1a; box-shadow: 0 2px 8px rgba(0,0,0,0.6); }
        [data-theme="dark"] .search-input { background: #111; border-color: #222; color: var(--text-dark); }
        [data-theme="dark"] .search-input:focus { background: #181818; border-color: var(--blue-mid); }
        [data-theme="dark"] .search-input::placeholder { color: var(--text-light); }
        [data-theme="dark"] .search-icon { color: var(--text-light); }
        [data-theme="dark"] .search-kbd { background: #111; border-color: #222; color: var(--text-light); }
        [data-theme="dark"] .search-clear { color: var(--text-light); }
        [data-theme="dark"] .search-clear:hover { background: #222; color: var(--text-dark); }

        [data-theme="dark"] .section { background: var(--card-bg); box-shadow: 0 2px 16px rgba(0,0,0,0.7); }
        /* Corrige especificidade: seções com temas têm seletores (0,3,0), então usamos seletores equivalentes */
        [data-theme="dark"] .section.tjsp     .section-header,
        [data-theme="dark"] .section.outros   .section-header,
        [data-theme="dark"] .section.sistemas .section-header,
        [data-theme="dark"] .section.juridico .section-header,
        [data-theme="dark"] .section.cartorios .section-header,
        [data-theme="dark"] .section.email    .section-header,
        [data-theme="dark"] .section.produtiv .section-header,
        [data-theme="dark"] .section.ferrament .section-header,
        [data-theme="dark"] .section.ias      .section-header,
        [data-theme="dark"] .section.noticias .section-header,
        [data-theme="dark"] .section.pinned   .section-header { background: #111; border-bottom-color: #1a1a1a; }
        [data-theme="dark"] .section-title { color: var(--text-light); }
        [data-theme="dark"] .grid { background: #1a1a1a; }
        [data-theme="dark"] .btn-wrap { background: var(--card-bg); }
        [data-theme="dark"] .btn { background: var(--card-bg); color: var(--text-dark); }
        [data-theme="dark"] .btn-label { color: var(--text-dark); }
        [data-theme="dark"] .btn-sublabel { color: var(--text-light); }
        [data-theme="dark"] .btn::after { color: var(--text-light); }
        [data-theme="dark"] .btn-pin { color: var(--text-light); }
        [data-theme="dark"] .btn-pin:hover { background: rgba(212, 182, 125, 0.18); }

        /* Dark mode — bordas laterais mais vivas por seção */
        [data-theme="dark"] .section.tjsp     { border-left-color: #5b8de0; }
        [data-theme="dark"] .section.outros   { border-left-color: #6a9ee8; }
        [data-theme="dark"] .section.sistemas { border-left-color: #2dd4bf; }
        [data-theme="dark"] .section.juridico { border-left-color: #a855f7; }
        [data-theme="dark"] .section.cartorios{ border-left-color: #fbbf24; }
        [data-theme="dark"] .section.email    { border-left-color: #f87171; }
        [data-theme="dark"] .section.produtiv { border-left-color: #4ade80; }
        [data-theme="dark"] .section.ferrament{ border-left-color: #22d3ee; }
        [data-theme="dark"] .section.ias      { border-left-color: #c084fc; }
        [data-theme="dark"] .section.noticias { border-left-color: #fbbf24; }
        [data-theme="dark"] .section.pinned   { border-left-color: var(--accent); }

        /* Dark mode — emoji/ícone do cabeçalho da seção */
        [data-theme="dark"] .section.tjsp     .section-emoji { color: #5b8de0; }
        [data-theme="dark"] .section.outros   .section-emoji { color: #6a9ee8; }
        [data-theme="dark"] .section.sistemas .section-emoji { color: #2dd4bf; }
        [data-theme="dark"] .section.juridico .section-emoji { color: #a855f7; }
        [data-theme="dark"] .section.cartorios .section-emoji{ color: #fbbf24; }
        [data-theme="dark"] .section.email    .section-emoji { color: #f87171; }
        [data-theme="dark"] .section.produtiv .section-emoji { color: #4ade80; }
        [data-theme="dark"] .section.ferrament .section-emoji{ color: #22d3ee; }
        [data-theme="dark"] .section.ias      .section-emoji { color: #c084fc; }
        [data-theme="dark"] .section.noticias .section-emoji { color: #fbbf24; }
        [data-theme="dark"] .section.pinned   .section-emoji { color: var(--accent); }

        /* Dark hover — quase preto com leve matiz da seção */

            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);

            flex-shrink: 0;

            text-transform: uppercase; color: var(--text-light);

            padding: 9px 12px;
            border: 1.5px solid #d0d8ef;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            color: var(--text-dark);
            background: var(--off-white);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .prazo-input:focus, .prazo-select:focus {
            border-color: var(--blue-mid);
            box-shadow: 0 0 0 3px rgba(42,82,152,0.12);
            background: #fff;
        }

            padding: 9px 20px;
            background: #0369a1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            white-space: nowrap;
            align-self: flex-end;
        }
        .prazo-btn:hover { background: #075985; transform: translateY(-1px); }
        .prazo-btn:active { transform: none; }
        .prazo-result {
            display: none;
            background: #f0f9ff;
            border: 1.5px solid #bae6fd;
            border-radius: 10px;
            padding: 16px 20px;
        }
        .prazo-result.visible { display: block; }
        .prazo-result-date { font-size: 1.08em; font-weight: 700; color: #0369a1; margin-bottom: 4px; }
        .prazo-result-detail { font-size: 0.8em; color: var(--text-light); }
        .prazo-result-warning {
            font-size: 0.78em; color: #b45309; margin-top: 10px;

        }
        .prazo-result-warning.visible { display: block; }

        [data-theme="dark"] .prazo-select { background: #111; border-color: #222; color: var(--text-dark); }

        [data-theme="dark"] .prazo-btn:hover { background: #0369a1; }
        [data-theme="dark"] .prazo-result { background: #0a1520; border-color: #1e4060; }
        [data-theme="dark"] .prazo-result-date { color: #38bdf8; }
        [data-theme="dark"] .prazo-result-warning { background: #1c1407; border-color: #78350f; color: #fbbf24; }

        @media (max-width: 600px) {
            .prazo-form-row { flex-direction: column; }
            .prazo-btn { width: 100%; justify-content: center; }
        }

        /* ── REDUCED MOTION ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            html { scroll-behavior: auto; }
        }
    </style>
</head>

    /* ════════════════════════════════════════════════════
       STATE  —  pinos, recentes e colapso no localStorage
       ════════════════════════════════════════════════════ */
    const PINS_KEY      = 'sarges:pinned';
    const RECENTS_KEY   = 'sarges:recents';
    const COLLAPSED_KEY = 'sarges:collapsed';

    const getPins = () => {
        try { return JSON.parse(localStorage.getItem(PINS_KEY) || '[]'); }
        catch (_) { return []; }
    };
    const setPins = (arr) => {
        try { localStorage.setItem(PINS_KEY, JSON.stringify(arr)); } catch (_) {}
    };

    const getRecents = () => {
        try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]'); }
        catch (_) { return []; }
    };
    const addRecent = (url) => {
        try {
            let r = getRecents().filter(u => u !== url);
            r.unshift(url);
            if (r.length > 10) r = r.slice(0, 10);
            localStorage.setItem(RECENTS_KEY, JSON.stringify(r));
        } catch (_) {}
    };

    const getCollapsed = () => {
        try { return new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '[]')); }
        catch (_) { return new Set(); }
    };
    const setCollapsed = (set) => {
        try { localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...set])); } catch (_) {}
    };

    /* ════════════════════════════════════════════════════
       HELPERS
       ════════════════════════════════════════════════════ */
    const escapeHTML = (s) => String(s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));

    function getDomain(url) {
        try { return new URL(url).hostname; } catch (_) { return ''; }
    }

    function renderButton(item, sectionId) {
        const extra      = item.cls       ? ` ${item.cls}`       : '';
        const iconCls    = item.iconClass  ? ` ${item.iconClass}`  : '';
        const searchText = (item.label + ' ' + item.sublabel).toLowerCase();
        const domain     = getDomain(item.url);
        const fav      = domain ? `img/favicons/${domain}.png` : '';
        /* Se o favicon local não existir, mostra o ícone FontAwesome como fallback.
           Usa style="display:none" (e não o atributo hidden) para vencer a especificidade do FontAwesome CSS. */
        const iconHtml = fav
            ? `<img class="btn-favicon" src="${escapeHTML(fav)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='';"><i class="${item.icon} btn-icon${iconCls}" style="display:none" aria-hidden="true"></i>`
            : `<i class="${item.icon} btn-icon${iconCls}" aria-hidden="true"></i>`;
        return `
            <div class="btn-wrap"
                 data-url="${escapeHTML(item.url)}"
                 data-section="${sectionId}"
                 data-label="${escapeHTML(searchText)}">
                <button class="btn-pin" type="button"
                        aria-label="Fixar ${escapeHTML(item.label)}"
                        data-pin-url="${escapeHTML(item.url)}">
                    <i class="fa-solid fa-thumbtack" aria-hidden="true"></i>
                </button>
                <a href="${escapeHTML(item.url)}" target="_blank" rel="noopener noreferrer"
                   class="btn${extra}">
                    ${iconHtml}
                    <span class="btn-label">${escapeHTML(item.label)}</span>
                    <span class="btn-sublabel">${escapeHTML(item.sublabel)}</span>
                </a>
            </div>
        `;
    }

    function renderSection(section) {
        return `
            <section class="section ${section.id}" data-section-id="${section.id}">
                <div class="section-header ${section.id}">
                    <i class="${section.icon} section-emoji" aria-hidden="true"></i>
                    <span class="section-title">${escapeHTML(section.title)}</span>
                    <button class="section-toggle" type="button" aria-label="Recolher ${escapeHTML(section.title)}">
                        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="section-body">
                    <div class="grid">
                        ${section.items.map(i => renderButton(i, section.id)).join('')}
                    </div>
                </div>
            </section>
        `;
    }

    function renderPinned() {
        const pins = getPins();
        const section = document.getElementById('pinnedSection');
        const grid    = document.getElementById('pinnedGrid');
        if (pins.length === 0) {
            section.hidden = true;
            grid.innerHTML = '';
            return;
        }
        const allItems = [];
        SECTIONS.forEach(s => s.items.forEach(i => allItems.push({ ...i, _section: s.id })));
        const pinnedItems = pins
            .map(url => allItems.find(i => i.url === url))
            .filter(Boolean);
        if (pinnedItems.length === 0) {
            section.hidden = true;
            return;
        }
        grid.innerHTML = pinnedItems.map(i => renderButton(i, 'pinned')).join('');
        section.hidden = false;
        section.classList.add('in-view');
    }

    function renderRecents() {
        const recents = getRecents();
        const section = document.getElementById('recentsSection');
        const grid    = document.getElementById('recentsGrid');
        if (recents.length === 0) { section.hidden = true; grid.innerHTML = ''; return; }
        const allItems = [];
        SECTIONS.forEach(s => s.items.forEach(i => allItems.push({ ...i })));
        const items = recents.map(url => allItems.find(i => i.url === url)).filter(Boolean);
        if (items.length === 0) { section.hidden = true; return; }
        grid.innerHTML = items.map(i => renderButton(i, 'recents')).join('');
        section.hidden = false;
        section.classList.add('in-view');
        updatePinStates();
    }

    /* ════════════════════════════════════════════════════
       INIT
       ════════════════════════════════════════════════════ */
    const main = document.getElementById('main');
    main.insertAdjacentHTML('beforeend', SECTIONS.map(renderSection).join(''));
    renderPinned();
    renderRecents();
    updatePinStates();
    applyCollapsedStates();

    /* ════════════════════════════════════════════════════
       PIN TOGGLE
       ════════════════════════════════════════════════════ */
    function updatePinStates() {
        const pins = getPins();
        document.querySelectorAll('.btn-pin').forEach(b => {
            const isPinned = pins.includes(b.dataset.pinUrl);
            b.classList.toggle('is-pinned', isPinned);
            const label = b.closest('.btn-wrap')?.querySelector('.btn-label')?.textContent || '';
            b.setAttribute('aria-label', (isPinned ? 'Desafixar ' : 'Fixar ') + label);
        });
    }

    main.addEventListener('click', (e) => {
        const pin = e.target.closest('.btn-pin');
        if (!pin) return;
        e.preventDefault();
        e.stopPropagation();
        const url = pin.dataset.pinUrl;
        let pins = getPins();
        if (pins.includes(url)) {
            pins = pins.filter(u => u !== url);
        } else {
            pins.push(url);
        }
        setPins(pins);
        renderPinned();
        updatePinStates();
        applyFilter();
    });

    /* ════════════════════════════════════════════════════
       SECTION COLLAPSE
       ════════════════════════════════════════════════════ */
    function applyCollapsedStates() {
        const collapsed = getCollapsed();
        document.querySelectorAll('main .section[data-section-id]').forEach(section => {
            const id = section.dataset.sectionId;
            const isCollapsed = collapsed.has(id);
            section.classList.toggle('is-collapsed', isCollapsed);
            const toggle = section.querySelector('.section-toggle');
            if (toggle) {
                const title = section.querySelector('.section-title')?.textContent || '';
                toggle.setAttribute('aria-label', (isCollapsed ? 'Expandir ' : 'Recolher ') + title);
            }
        });
    }

    main.addEventListener('click', (e) => {
        const toggle = e.target.closest('.section-toggle');
        if (!toggle) return;
        const section = toggle.closest('.section');
        if (!section) return;
        section.classList.toggle('is-collapsed');
        const isNowCollapsed = section.classList.contains('is-collapsed');
        const title = section.querySelector('.section-title')?.textContent || '';
        toggle.setAttribute('aria-label', (isNowCollapsed ? 'Expandir ' : 'Recolher ') + title);
        const sectionId = section.dataset.sectionId;
        if (sectionId) {
            const collapsed = getCollapsed();
            isNowCollapsed ? collapsed.add(sectionId) : collapsed.delete(sectionId);
            setCollapsed(collapsed);
        }
    });

    /* ════════════════════════════════════════════════════
       RECENTES  —  rastrear cliques nos links
       ════════════════════════════════════════════════════ */
    main.addEventListener('click', (e) => {
        const link = e.target.closest('a.btn');
        if (!link) return;
        const url = link.getAttribute('href');
        if (url) { addRecent(url); renderRecents(); }
    });

    /* ════════════════════════════════════════════════════
       SEARCH
       ════════════════════════════════════════════════════ */
    const input        = document.getElementById('searchInput');
    const clearBtn     = document.getElementById('searchClear');
    const kbd          = document.getElementById('searchKbd');
    const noResults    = document.getElementById('noResults');
    const noResultsQry = document.getElementById('noResultsQuery');

    function applyFilter() {
        const query = input.value.trim().toLowerCase();
        clearBtn.classList.toggle('visible', query.length > 0);
        kbd.style.display = query.length > 0 ? 'none' : '';
        document.body.classList.toggle('has-search', query.length > 0);

        let totalVisible = 0;
        document.querySelectorAll('main .section').forEach(section => {
            const wraps = section.querySelectorAll('.btn-wrap');
            let sectionVisible = 0;
            wraps.forEach(wrap => {
                const matches = !query || (wrap.dataset.label || '').includes(query);
                wrap.classList.toggle('hidden', !matches);
                if (matches) sectionVisible++;
            });
            section.classList.toggle('hidden', sectionVisible === 0);
            totalVisible += sectionVisible;
        });

        noResultsQry.textContent = input.value.trim();
        noResults.classList.toggle('visible', totalVisible === 0 && query.length > 0);
    }

    input.addEventListener('input', applyFilter);

    clearBtn.addEventListener('click', () => {
        input.value = '';
        applyFilter();
        input.focus();
    });

    /* ════════════════════════════════════════════════════
       KEYBOARD SHORTCUTS  —  "/" foca a busca, "Esc" limpa
       ════════════════════════════════════════════════════ */
    document.addEventListener('keydown', (e) => {
        const tag = document.activeElement?.tagName;
        const typing = tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable;

        if (e.key === '/' && !typing) {
            e.preventDefault();
            input.focus();
            input.select();
        } else if (e.key === 'Escape' && document.activeElement === input) {
            input.value = '';
            applyFilter();
            input.blur();
        }
    });

    /* ════════════════════════════════════════════════════
       CLOCK + GREETING
       ════════════════════════════════════════════════════ */
    function updateClock() {
        const now  = new Date();
        const date = now.toLocaleDateString('pt-BR', {
            weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
        });
        const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const h = now.getHours();
        const greet = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
        document.getElementById('headerClock').textContent = `${greet} • ${date} • ${time}`;
    }
    updateClock();
    setInterval(updateClock, 30 * 1000);

    /* ════════════════════════════════════════════════════
       INTERSECTION OBSERVER  —  animar seções ao entrar na tela
       ════════════════════════════════════════════════════ */
    if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('in-view');
                    io.unobserve(e.target);
                }
            });
        }, { rootMargin: '0px 0px -60px 0px', threshold: 0.04 });
        document.querySelectorAll('main .section').forEach(s => io.observe(s));
    } else {
        document.querySelectorAll('main .section').forEach(s => s.classList.add('in-view'));
    }

    /* ════════════════════════════════════════════════════
       THEME  —  light/dark com persistência
       ════════════════════════════════════════════════════ */
    const THEME_KEY = 'sarges:theme';
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = themeBtn.querySelector('i');

    function getActiveTheme() {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored === 'light' || stored === 'dark') return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        themeBtn.setAttribute('aria-label', theme === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro');
        const metaThemeColor = document.querySelector('meta[name=theme-color]');
        if (metaThemeColor) metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#0f2044');
    }

    applyTheme(getActiveTheme());

    themeBtn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
        applyTheme(next);
    });

    /* Reage a mudanças do sistema APENAS se o usuário não tiver override manual */
    const mql = window.matchMedia('(prefers-color-scheme: dark)');
    if (mql.addEventListener) {
        mql.addEventListener('change', (e) => {
            if (!localStorage.getItem(THEME_KEY)) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });
    }

    /* ════════════════════════════════════════════════════
       WEATHER  —  Open-Meteo + Geolocation (sem chave de API)
       ════════════════════════════════════════════════════ */
    (function initWeather() {
        const WEATHER_KEY = 'sarges:weather';
        const CACHE_TTL   = 30 * 60 * 1000;
        const el          = document.getElementById('headerWeather');
        if (!el) return;

        const WMO = {
            0:  { label: 'Céu limpo',               icon: 'fa-sun' },
            1:  { label: 'Predominantemente limpo',  icon: 'fa-cloud-sun' },
            2:  { label: 'Parcialmente nublado',     icon: 'fa-cloud-sun' },
            3:  { label: 'Nublado',                  icon: 'fa-cloud' },
            45: { label: 'Neblina',                  icon: 'fa-smog' },
            48: { label: 'Neblina com gelo',         icon: 'fa-smog' },
            51: { label: 'Garoa leve',               icon: 'fa-cloud-rain' },
            53: { label: 'Garoa moderada',           icon: 'fa-cloud-rain' },
            55: { label: 'Garoa intensa',            icon: 'fa-cloud-rain' },
            61: { label: 'Chuva leve',               icon: 'fa-cloud-rain' },
            63: { label: 'Chuva moderada',           icon: 'fa-cloud-rain' },
            65: { label: 'Chuva intensa',            icon: 'fa-cloud-showers-heavy' },
            71: { label: 'Neve leve',                icon: 'fa-snowflake' },
            73: { label: 'Neve moderada',            icon: 'fa-snowflake' },
            75: { label: 'Neve intensa',             icon: 'fa-snowflake' },
            77: { label: 'Granizo',                  icon: 'fa-snowflake' },
            80: { label: 'Pancadas leves',           icon: 'fa-cloud-showers-heavy' },
            81: { label: 'Pancadas moderadas',       icon: 'fa-cloud-showers-heavy' },
            82: { label: 'Pancadas fortes',          icon: 'fa-cloud-showers-heavy' },
            85: { label: 'Neve fraca',               icon: 'fa-snowflake' },
            86: { label: 'Neve forte',               icon: 'fa-snowflake' },
            95: { label: 'Tempestade',               icon: 'fa-bolt' },
            96: { label: 'Tempestade com granizo',   icon: 'fa-bolt' },
            99: { label: 'Tempestade forte',         icon: 'fa-bolt' },
        };

        function wmoInfo(code) {
            return WMO[code] || WMO[Math.floor(code / 10) * 10] || { label: '—', icon: 'fa-cloud' };
        }

        function render(temp, code) {
            const info = wmoInfo(code);
            el.innerHTML = `<i class="fa-solid ${info.icon}" aria-hidden="true"></i>${Math.round(temp)}°C · ${info.label}`;
        }

        function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
            fetch(url)
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(d => {
                    const temp = d.current.temperature_2m;
                    const code = d.current.weather_code;
                    try { localStorage.setItem(WEATHER_KEY, JSON.stringify({ temp, code, lat, lon, ts: Date.now() })); } catch (_) {}
                    render(temp, code);
                })
                .catch(() => {});
        }

        function tryCache() {
            try {
                const c = JSON.parse(localStorage.getItem(WEATHER_KEY));
                if (c && (Date.now() - c.ts) < CACHE_TTL) {
                    render(c.temp, c.code);
                    if ((Date.now() - c.ts) > 15 * 60 * 1000) fetchWeather(c.lat, c.lon);
                    return true;
                }
            } catch (_) {}
            return false;
        }

        if (tryCache()) return;

        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            ({ coords }) => fetchWeather(coords.latitude, coords.longitude),
            () => {},
            { timeout: 8000, maximumAge: 3600000 }
        );
    })();

    /* ════════════════════════════════════════════════════

    (function initPrazos() {

        const TIPOS = [
            // ── CPC — Processo Civil (dias úteis) ──────────────────
            { id:'apelacao_cpc',   grp:'cpc',    label:'Apelação',                       dias:15, modo:'uteis',   ref:'Art. 1.003 §5 CPC' },

            { id:'agravo_instr',   grp:'cpc',    label:'Agravo de Instrumento',          dias:15, modo:'uteis',   ref:'Art. 1.003 §5 CPC' },
            { id:'agravo_int',     grp:'cpc',    label:'Agravo Interno',                 dias:15, modo:'uteis',   ref:'Art. 1.021 CPC' },

            { id:'manifestacao',   grp:'cpc',    label:'Manifestação / Prazo Geral',     dias:15, modo:'uteis',   ref:'Art. 218 §3 CPC' },
            // ── JEC Cível — Juizado Especial (dias corridos, FONAJE) ──
            { id:'recurso_jec',    grp:'jec',    label:'Recurso Inominado',              dias:10, modo:'corridos', ref:'Art. 42 Lei 9.099 (FONAJE — dias corridos)' },
            { id:'embargos_jec',   grp:'jec',    label:'Embargos de Declaração',         dias: 5, modo:'corridos', ref:'Art. 49 Lei 9.099 (FONAJE — dias corridos)' },
            // ── CPP — Processo Penal (dias corridos) ───────────────
            { id:'apelacao_cpp',   grp:'cpp',    label:'Apelação Criminal',              dias: 5, modo:'corridos', ref:'Art. 593 CPP' },
            { id:'rse',            grp:'cpp',    label:'Recurso em Sentido Estrito',     dias: 5, modo:'corridos', ref:'Art. 586 CPP' },
            { id:'razoes_cpp',     grp:'cpp',    label:'Razões de Recurso Criminal',     dias: 8, modo:'corridos', ref:'Art. 600 CPP' },
            { id:'embargos_cpp',   grp:'cpp',    label:'Embargos de Declaração Criminal',dias: 2, modo:'corridos', ref:'Art. 619 CPP' },
            { id:'resposta_acus',  grp:'cpp',    label:'Resposta à Acusação',            dias:10, modo:'corridos', ref:'Art. 396-A CPP' },
            { id:'contrarrazoes',  grp:'cpp',    label:'Contrarrazões Criminais',        dias: 8, modo:'corridos', ref:'Art. 600 CPP' },
            // ── JECRIM — Juizado Especial Criminal (dias corridos, CPP subsidiário) ──
            { id:'recurso_jecrim', grp:'jecrim', label:'Recurso Inominado Criminal',     dias:10, modo:'corridos', ref:'Art. 82 §1 Lei 9.099' },
        ];

        const GRUPOS = {
            cpc:    'CPC — Processo Civil (dias úteis)',
            jec:    'JEC Cível — Juizado Especial (dias corridos)',
            cpp:    'CPP — Processo Penal (dias corridos)',
            jecrim: 'JECRIM — Juizado Especial Criminal (dias corridos)',
        };

        /* ── Feriados ─────────────────────────────────────────────── */
        function calcPascoa(year) {
            const a=year%19, b=Math.floor(year/100), c=year%100;
            const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
            const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
            const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
            const m=Math.floor((a+11*h+22*l)/451);
            const mes=Math.floor((h+l-7*m+114)/31);
            const dia=((h+l-7*m+114)%31)+1;
            return new Date(year, mes-1, dia);
        }

        function addDays(date, n) {
            const d = new Date(date); d.setDate(d.getDate()+n); return d;
        }

        function mmdd(date) {
            return String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
        }

        function buildFeriados(year) {
            /* Nacionais fixos + feriado estadual SP (07/09 = Revolução Constitucionalista) */
            const fixos = new Set([
                '01-01','04-21','05-01','07-09','09-07',
                '10-12','11-02','11-15','11-20','12-25',
            ]);
            const pascoa = calcPascoa(year);
            const moveis = new Set([
                mmdd(addDays(pascoa,-48)), // Carnaval — segunda
                mmdd(addDays(pascoa,-47)), // Carnaval — terça
                mmdd(addDays(pascoa, -2)), // Sexta-feira Santa
                mmdd(addDays(pascoa, 60)), // Corpus Christi
            ]);
            return { fixos, moveis };
        }

        const _feriadosCache = {};
        function getFeriados(year) {
            return _feriadosCache[year] || (_feriadosCache[year] = buildFeriados(year));
        }

        function isNaoUtil(date) {
            const dow = date.getDay();
            if (dow === 0 || dow === 6) return true;
            const f = getFeriados(date.getFullYear());
            const d = mmdd(date);
            return f.fixos.has(d) || f.moveis.has(d);
        }

        /* ── Algoritmos de cálculo ────────────────────────────────── */
        function calcPrazo(dataStr, tipo) {
            /* Usa new Date(y,m,d) — sem string ISO — para evitar bug de UTC */
            const [y,m,d] = dataStr.split('-').map(Number);
            let cur = new Date(y, m-1, d);
            let dias = tipo.dias;

            if (tipo.modo === 'uteis') {
                /* Conta apenas dias úteis; início excluído (CPC Art. 224) */
                while (dias > 0) {
                    cur = addDays(cur, 1);
                    if (!isNaoUtil(cur)) dias--;
                }
            } else {
                /* Conta todos os dias corridos; início excluído (CPP Art. 798 §1)
                   Se o vencimento cair em não-útil, prorroga (CPP Art. 798 §3) */
                cur = addDays(cur, dias);
                while (isNaoUtil(cur)) cur = addDays(cur, 1);
            }
            return cur;
        }

        /* ── Render ───────────────────────────────────────────────── */
        const grpMap = {};
        TIPOS.forEach(t => { (grpMap[t.grp] = grpMap[t.grp] || []).push(t); });

        const optgroupsHTML = Object.entries(grpMap).map(([grp, tipos]) =>
            `<optgroup label="${GRUPOS[grp]}">` +
            tipos.map(t =>
                `<option value="${t.id}">${t.label} — ${t.dias} dia${t.dias>1?'s':''} ${t.modo==='uteis'?'úteis':'corridos'}</option>`
            ).join('') +
            '</optgroup>'
        ).join('');

        main.insertAdjacentHTML('beforeend', `
            <section class="section prazo in-view" data-section-id="prazo" aria-label="Calculadora de Prazos">
                <div class="section-header prazo">
                    <i class="fa-solid fa-calendar-days section-emoji" aria-hidden="true"></i>
                    <span class="section-title">Calculadora de Prazos</span>
                    <button class="section-toggle" type="button" aria-label="Recolher Calculadora de Prazos">
                        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="section-body">
                    <div class="prazo-calc">
                        <div class="prazo-form-row">
                            <div class="prazo-field">
                                <label class="prazo-label" for="prazoData">Data da Intimação / Publicação</label>
                                <input type="date" id="prazoData" class="prazo-input" aria-required="true">
                            </div>
                            <div class="prazo-field" style="flex:2;min-width:220px">
                                <label class="prazo-label" for="prazoTipo">Tipo de Prazo</label>
                                <select id="prazoTipo" class="prazo-select">${optgroupsHTML}</select>
                            </div>
                            <button class="prazo-btn" id="prazoBtn" type="button">
                                <i class="fa-solid fa-calculator" aria-hidden="true"></i> Calcular
                            </button>
                        </div>
                        <div class="prazo-result" id="prazoResult" role="status" aria-live="polite">
                            <div class="prazo-result-date" id="prazoResultDate"></div>
                            <div class="prazo-result-detail" id="prazoResultDetail"></div>
                            <div class="prazo-result-warning" id="prazoResultWarning">
                                ⚠️ Confira suspensões vigentes: recesso forense, greves, suspensões do CNJ ou do TJSP.
                                Feriados municipais de São Paulo (ex.: 25/01) não estão incluídos.
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        `);

        /* Pré-preenche com a data de hoje */
        const hoje = new Date();
        document.getElementById('prazoData').value =
            `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;

        function calcular() {
            const dataStr = document.getElementById('prazoData').value;
            if (!dataStr) { document.getElementById('prazoData').focus(); return; }
            const tipoId  = document.getElementById('prazoTipo').value;
            const tipo    = TIPOS.find(t => t.id === tipoId);
            if (!tipo) return;

            const resultado = calcPrazo(dataStr, tipo);
            const [y,m,d]   = dataStr.split('-').map(Number);
            const inicio    = new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
            const fim       = resultado.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

            document.getElementById('prazoResultDate').textContent   = fim;
            document.getElementById('prazoResultDetail').textContent =
                `${tipo.dias} dia${tipo.dias>1?'s':''} ${tipo.modo==='uteis'?'úteis':'corridos'} a partir de ${inicio} · ${tipo.ref}`;
            document.getElementById('prazoResultWarning').classList.add('visible');
            document.getElementById('prazoResult').classList.add('visible');
        }

        document.getElementById('prazoBtn').addEventListener('click', calcular);
        document.getElementById('prazoData').addEventListener('keydown', e => { if (e.key==='Enter') calcular(); });
    })();

    /* ════════════════════════════════════════════════════
       PWA  —  service worker para cache offline
       ════════════════════════════════════════════════════ */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
})();
</script>

</body>
